name: Validate

on:
  push:
  pull_request:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-test.txt
      - run: pytest -v

  ds-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test
        working-directory: ds-ha-bridge/tests/host

  ds-rom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the .nds ROM with the BlocksDS toolchain
        run: >-
          docker run --rm -v "$PWD/ds-ha-bridge":/project -w /project
          skylyrac/blocksds:dev-latest make
      - name: Upload the ROM as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds-ha-bridge-nds
          path: ds-ha-bridge/ds-ha-bridge.nds
          if-no-files-found: error
